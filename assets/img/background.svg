<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="animation: svgFadeIn 1s ease forwards;">
  <style>
    @keyframes svgFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    svg { opacity: 0; }
  </style>

  <defs>
    <!-- Gradients -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a8dfff"/>
      <stop offset="60%"  stop-color="#3385ff"/>
      <stop offset="100%" stop-color="#3c5fac"/>
    </radialGradient>

    <!-- Filter: pulled out of animated group to avoid WebKit compositing bug -->
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- All motion paths in one defs block, resolved before use -->
    <path id="orbit1" d="M 480,400 a 80,36 0 1,1 -160,0 a 80,36 0 1,1 160,0"/>
    <path id="orbit2" d="M 530,400 a 130,58 0 1,1 -260,0 a 130,58 0 1,1 260,0"/>
    <path id="orbit3" d="M 590,400 a 190,86 0 1,1 -380,0 a 190,86 0 1,1 380,0"/>
    <path id="orbit4" d="M 660,400 a 260,118 0 1,1 -520,0 a 260,118 0 1,1 520,0"/>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050816"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="90"  cy="120" r="2"/>
    <circle cx="180" cy="70"  r="1.5"/>
    <circle cx="300" cy="140" r="2"/>
    <circle cx="500" cy="90"  r="1.5"/>
    <circle cx="670" cy="180" r="2"/>
    <circle cx="730" cy="90"  r="1.2"/>
    <circle cx="120" cy="640" r="2"/>
    <circle cx="220" cy="720" r="1.5"/>
    <circle cx="650" cy="690" r="1.8"/>
    <circle cx="710" cy="600" r="1.3"/>
    <circle cx="560" cy="740" r="1.6"/>
    <circle cx="80"  cy="300" r="1.3"/>
    <circle cx="760" cy="360" r="1.7"/>
  </g>

  <!-- Orbit rings -->
  <g fill="none" stroke="white" stroke-opacity="0.15">
    <ellipse cx="400" cy="400" rx="80"  ry="36"/>
    <ellipse cx="400" cy="400" rx="130" ry="58"/>
    <ellipse cx="400" cy="400" rx="190" ry="86"/>
    <ellipse cx="400" cy="400" rx="260" ry="118"/>
  </g>

  <!-- Sun (filter applied directly on the element, not inside an opacity group) -->
  <circle cx="400" cy="400" r="28" fill="url(#sunGlow)" filter="url(#blurGlow)"/>

  <!-- Mercury -->
  <circle r="6" fill="#b7b7b7">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orbit1"/>
    </animateMotion>
  </circle>

  <!-- Venus -->
  <circle r="9" fill="#d9a066">
    <animateMotion dur="7s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orbit2"/>
    </animateMotion>
  </circle>

  <!-- Earth -->
  <circle r="10" fill="#4da6ff">
    <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orbit3"/>
    </animateMotion>
  </circle>

  <!-- Mars -->
  <circle r="8" fill="#c1440e">
    <animateMotion dur="15s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orbit4"/>
    </animateMotion>
  </circle>
</svg>